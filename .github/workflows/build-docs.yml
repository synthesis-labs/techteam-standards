name: Build and Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'sites/**'
      - 'decks/**'
      - '.github/workflows/build-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel in-progress deploys
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render all documents
        run: |
          for doc_dir in docs/*/; do
            doc_name="$(basename "$doc_dir")"
            if [ -f "$doc_dir/index.qmd" ]; then
              echo "Rendering: $doc_name (index.qmd)"
              (cd "$doc_dir" && quarto render "index.qmd")
            elif [ -f "$doc_dir/$doc_name.md" ]; then
              echo "Rendering: $doc_name"
              (cd "$doc_dir" && quarto render "$doc_name.md")
            fi
          done

      - name: Render all sites
        run: |
          for site_dir in sites/*/; do
            site_name="$(basename "$site_dir")"
            [ -f "$site_dir/index.qmd" ] || continue
            echo "Rendering site: $site_name"
            (cd "$site_dir" && quarto render "index.qmd")
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build all decks
        run: |
          for deck_dir in decks/*/; do
            deck_name="$(basename "$deck_dir")"
            [ -f "$deck_dir/slides.md" ] || continue
            echo "Building deck: $deck_name"
            (cd "$deck_dir" && npm install && npm run build -- --base /${{ github.event.repository.name }}/decks/$deck_name/)
            mkdir -p "dist/decks/$deck_name"
            cp -r "$deck_dir/dist/." "dist/decks/$deck_name/"
          done

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
